spring.application.name=contructionInventoryAPI

# ==============================================================
# 1. DATABASE CONNECTION
# ==============================================================
# sendStringParametersAsUnicode=true -> Crucial for sending Khmer text to SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ConstructionInventoryDB;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true
spring.datasource.username=sa
spring.datasource.password=sqlServer@2025

# ==============================================================
# 2. JPA / HIBERNATE CONFIGURATION
# ==============================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# !!! WARNING: 'create' WIPES the database on every start.
# Use this ONCE to build the schema with NVARCHAR, then change to 'update'.
spring.jpa.hibernate.ddl-auto=update

# !!! CRITICAL FOR KHMER SUPPORT:
# This forces Hibernate to create columns as NVARCHAR instead of VARCHAR
spring.jpa.properties.hibernate.use_nationalized_character_data=true

# ==============================================================
# 3. SQL SCRIPT ENCODING
# ==============================================================
# Fixes "Input length = 1" error when reading data.sql
spring.sql.init.encoding=UTF-8
spring.sql.init.mode=always

# ==============================================================
# 4. HTTP & FILE ENCODING
# ==============================================================
spring.web.error.include-message=always
spring.web.error.include-stacktrace=always

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Force HTTP requests/responses to be UTF-8
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true
spring.servlet.encoding.enabled=true